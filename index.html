<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<title>Καιρικές Συνθήκες</title>

<style>
html, body{ width:100%;
    height:100%;
    margin:0;
    padding:0;
    background:white;
    font-family: Arial, sans-serif;
}
    

.card{
     background:white;
    border-radius:15px;
    padding:20px;
    box-sizing:border-box;
    width:100%;
    height:100%;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.temp{
    font-size:32px;
    font-weight:bold;
}

#weatherIcon{
    display:block;
    margin:10px auto;
    width:100px;
    height:100px;
}

</style>

</head>
<body>

<div class="card">
    <h2 id="city">Φόρτωση...</h2>
    
    <img id="weatherIcon" width="80">

    <div class="temp" id="temp"></div>

    <p id="desc"></p>

    <p><b>Υγρασία:</b> <span id="humidity"></span>%</p>

    <p><b>Άνεμος:</b> <span id="wind"></span> m/s</p>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const lat = params.get("lat");
const lon = params.get("lon");

const apiKey = "58b5a645e637795a1030d403fb199df0";

fetch(
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=el&appid=${apiKey}`
)
.then(response => response.json())
.then(data => {

document.getElementById("city").innerHTML =
data.name;

const iconCode = data.weather[0].icon;

document.getElementById("weatherIcon").src =
`https://openweathermap.org/img/wn/${iconCode}@2x.png`;

document.getElementById("temp").innerHTML =
data.main.temp + " °C";

document.getElementById("desc").innerHTML =
data.weather[0].description;

document.getElementById("humidity").innerHTML =
data.main.humidity;

document.getElementById("wind").innerHTML =
data.wind.speed;

})
.catch(error => {

document.getElementById("city").innerHTML =
"Σφάλμα φόρτωσης";

console.error(error);

});

</script>

</body>
</html>
