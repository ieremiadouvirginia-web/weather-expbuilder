<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<title>Καιρικές Συνθήκες</title>


    
<style>
html, body{ width:100%;
    height:100%;
    margin:0;
    padding:0;
    background:white;
    font-family: Arial, sans-serif;
}
    

.card{
    background:linear-gradient(to bottom,#ffffff,#f3f7fb);
    border-radius:20px;
    padding:18px;
    box-sizing:border-box;
    width:100%;
    height:100%;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    overflow:auto;
}

 #city{
    text-align:center;
    margin-bottom:5px;
}


.temp{
   font-size:36px;
    font-weight:bold;
    text-align:center;
    color:#1f4e79;
}

    #desc{
    text-align:center;
    font-size:18px;
    color:#666;
}


#weatherIcon{
    display:block;
    text-align:center;
    font-size:90px;
    margin:5px auto;
    line-height:1;
   
}

    #forecast{
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:10px;
}

.forecastDay{
    background:#f3f7fb;
    border-radius:10px;
    padding:8px;
    text-align:center;
    min-width:70px;
    font-size:13px;
}


.card p{
    text-align:center;
    margin:6px 0;
}

.card h3{
    text-align:center;
    margin:12px 0 8px 0;
    font-size:16px;
}
</style>

</head>
<body>

<div class="card">
    <h2 id="city">Φόρτωση...</h2>
    
   <div id="weatherIcon"></div>

    <div class="temp" id="temp"></div>

    <p id="desc"></p>

  <p>🥵 <b>Αίσθηση:</b> <span id="feelsLike"></span> °C</p>

  <p>💧 <b>Υγρασία:</b> <span id="humidity"></span>%</p>

  <p>🌬️ <b>Άνεμος:</b> <span id="wind"></span> m/s</p>
    
  <p>🌅 <b>Ανατολή:</b> <span id="sunrise"></span></p>

  <p>🌇 <b>Δύση:</b> <span id="sunset"></span></p>

<h3>Πρόγνωση 5 ημερών</h3>
<div id="forecast"></div>
    
</div>

<script>

const params = new URLSearchParams(window.location.search);

const lat = params.get("lat");
const lon = params.get("lon");

const apiKey = "58b5a645e637795a1030d403fb199df0";

fetch(
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=el&appid=${apiKey}`
)
.then(response => response.json())
.then(data => {

document.getElementById("city").innerHTML =
data.name;

const iconCode = data.weather[0].icon;

let icon = "☀️";

let cardColor =
"linear-gradient(to bottom,#ffffff,#f3f7fb)";

if(iconCode === "01d" || iconCode === "01n") icon = "☀️";
if(iconCode === "02d" || iconCode === "02n") icon = "🌤️";
if(iconCode === "03d" || iconCode === "03n") icon = "☁️";
if(iconCode === "04d" || iconCode === "04n") icon = "☁️";
if(iconCode === "09d" || iconCode === "09n") icon = "🌧️";
if(iconCode === "10d" || iconCode === "10n") icon = "🌦️";
if(iconCode === "11d" || iconCode === "11n") icon = "⛈️";
if(iconCode === "13d" || iconCode === "13n") icon = "❄️";
if(iconCode === "50d" || iconCode === "50n") icon = "🌫️";


if(iconCode.startsWith("01"))
cardColor =
"linear-gradient(to bottom,#fff6b7,#ffd86f)";

if(iconCode.startsWith("02"))
cardColor =
"linear-gradient(to bottom,#fff4d6,#ffe8a3)";

if(iconCode.startsWith("03") ||
   iconCode.startsWith("04"))
cardColor =
"linear-gradient(to bottom,#eef2f5,#d5dde5)";

if(iconCode.startsWith("09") ||
   iconCode.startsWith("10"))
cardColor =
"linear-gradient(to bottom,#cfe8ff,#8fc2ff)";

if(iconCode.startsWith("11"))
cardColor =
"linear-gradient(to bottom,#5b6470,#2d3440)";

if(iconCode.startsWith("13"))
cardColor =
"linear-gradient(to bottom,#f7fbff,#dfefff)";
 

if(iconCode.startsWith("50"))
cardColor =
"linear-gradient(to bottom,#f0f0f0,#d9d9d9)";

document.getElementById("weatherIcon").innerHTML = icon;

document.querySelector(".card").style.background =
cardColor;

document.getElementById("temp").innerHTML =
data.main.temp + " °C";

document.getElementById("desc").innerHTML =
data.weather[0].description;

document.getElementById("feelsLike").innerHTML =
data.main.feels_like.toFixed(1);

document.getElementById("humidity").innerHTML =
data.main.humidity;

document.getElementById("wind").innerHTML =
data.wind.speed;

const sunrise = new Date(data.sys.sunrise * 1000);
const sunset = new Date(data.sys.sunset * 1000);

document.getElementById("sunrise").innerHTML =
sunrise.toLocaleTimeString("el-GR", {
    hour: "2-digit",
    minute: "2-digit"
});

document.getElementById("sunset").innerHTML =
sunset.toLocaleTimeString("el-GR", {
    hour: "2-digit",
    minute: "2-digit"
});

})
.catch(error => {

document.getElementById("city").innerHTML =
"Σφάλμα φόρτωσης";

console.error(error);

});

fetch(
`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&lang=el&appid=${apiKey}`
)
.then(response => response.json())
.then(data => {

const forecastDiv =
document.getElementById("forecast");

forecastDiv.innerHTML = "";

const daily = data.list.filter(item =>
item.dt_txt.includes("12:00:00")
);

daily.slice(0,5).forEach(day => {

const date = new Date(day.dt * 1000);

const dayName =
date.toLocaleDateString("el-GR", {
weekday:"short"
});

const temp =
Math.round(day.main.temp);

const iconCode =
day.weather[0].icon;

let icon = "☀️";

if(iconCode.startsWith("02")) icon = "🌤️";
if(iconCode.startsWith("03")) icon = "☁️";
if(iconCode.startsWith("04")) icon = "☁️";
if(iconCode.startsWith("09")) icon = "🌧️";
if(iconCode.startsWith("10")) icon = "🌦️";
if(iconCode.startsWith("11")) icon = "⛈️";
if(iconCode.startsWith("13")) icon = "❄️";
if(iconCode.startsWith("50")) icon = "🌫️";

forecastDiv.innerHTML += `
<div class="forecastDay">
<div><b>${dayName}</b></div>
<div style="font-size:28px">${icon}</div>
<div>${temp}°C</div>
</div>
`;

});

})
.catch(error => {
console.error(error);
});


</script>

</body>
</html>
