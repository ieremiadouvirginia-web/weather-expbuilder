<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<title>Καιρικές Συνθήκες</title>

<style>
html, body{ width:100%;
    height:100%;
    margin:0;
    padding:0;
    background:white;
    font-family: Arial, sans-serif;
}
    

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-sizing:border-box;
    width:100%;
    height:100%;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

 #city{
    text-align:center;
    margin-bottom:5px;
}


.temp{
   font-size:42px;
    font-weight:bold;
    text-align:center;
    color:#1f4e79;
}

    #desc{
    text-align:center;
    font-size:18px;
    color:#666;
}


#weatherIcon{
    display:block;
    text-align:center;
    font-size:120px;
    margin:10px auto;
    line-height:1;
   
}

</style>

</head>
<body>

<div class="card">
    <h2 id="city">Φόρτωση...</h2>
    
   <div id="weatherIcon"></div>

    <div class="temp" id="temp"></div>

    <p id="desc"></p>

  <p>🥵 <b>Αίσθηση:</b> <span id="feelsLike"></span> °C</p>

  <p>💧 <b>Υγρασία:</b> <span id="humidity"></span>%</p>

  <p>🌬️ <b>Άνεμος:</b> <span id="wind"></span> m/s</p>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const lat = params.get("lat");
const lon = params.get("lon");

const apiKey = "58b5a645e637795a1030d403fb199df0";

fetch(
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=el&appid=${apiKey}`
)
.then(response => response.json())
.then(data => {

document.getElementById("city").innerHTML =
data.name;

const iconCode = data.weather[0].icon;
console.log(data.weather[0].icon);

let icon = "☀️";

if(iconCode === "01d" || iconCode === "01n") icon = "☀️";
if(iconCode === "02d" || iconCode === "02n") icon = "🌤️";
if(iconCode === "03d" || iconCode === "03n") icon = "☁️";
if(iconCode === "04d" || iconCode === "04n") icon = "☁️";
if(iconCode === "09d" || iconCode === "09n") icon = "🌧️";
if(iconCode === "10d" || iconCode === "10n") icon = "🌦️";
if(iconCode === "11d" || iconCode === "11n") icon = "⛈️";
if(iconCode === "13d" || iconCode === "13n") icon = "❄️";
if(iconCode === "50d" || iconCode === "50n") icon = "🌫️";

document.getElementById("weatherIcon").innerHTML = icon;

document.getElementById("temp").innerHTML =
data.main.temp + " °C";

document.getElementById("desc").innerHTML =
data.weather[0].description;

document.getElementById("feelsLike").innerHTML =
data.main.feels_like.toFixed(1);

document.getElementById("humidity").innerHTML =
data.main.humidity;

document.getElementById("wind").innerHTML =
data.wind.speed;

})
.catch(error => {

document.getElementById("city").innerHTML =
"Σφάλμα φόρτωσης";

console.error(error);

});

</script>

</body>
</html>
